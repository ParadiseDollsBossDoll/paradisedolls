; Paradise Dolls — PHP OPcache production settings
; Copy to: /etc/php/8.2/fpm/conf.d/99-paradisedollz-opcache.ini
; After copying: sudo systemctl restart php8.2-fpm
;
; IMPORTANT: validate_timestamps=0 means PHP never checks if files changed on disk.
; After every code deployment, run: sudo systemctl restart php8.2-fpm
; to clear the opcode cache and pick up new files.

[opcache]
opcache.enable=1
opcache.enable_cli=0
opcache.memory_consumption=256
opcache.interned_strings_buffer=16
opcache.max_accelerated_files=20000
opcache.validate_timestamps=0
opcache.save_comments=1
opcache.fast_shutdown=1
