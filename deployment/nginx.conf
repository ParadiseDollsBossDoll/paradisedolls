# Paradise Dolls — Nginx server config
# Place at: /etc/nginx/sites-available/paradisedollz
# Enable: sudo ln -s /etc/nginx/sites-available/paradisedollz /etc/nginx/sites-enabled/paradisedollz
# Replace every occurrence of "yourdomain.com" with your actual domain before using.

# Redirect HTTP → HTTPS
server {
    listen 80;
    listen [::]:80;
    server_name yourdomain.com www.yourdomain.com;

    # Allow Let's Encrypt ACME challenge for SSL cert renewal
    location /.well-known/acme-challenge/ {
        root /var/www/paradisedollz/public;
        try_files $uri =404;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# Main HTTPS block
server {
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;

    server_name yourdomain.com www.yourdomain.com;
    root /var/www/paradisedollz/public;
    index index.php;

    # SSL — managed by Certbot (do not edit these lines manually)
    ssl_certificate /etc/letsencrypt/live/yourdomain.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/yourdomain.com/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # Gzip compression (saves bandwidth on JSON responses and JS/CSS)
    gzip on;
    gzip_vary on;
    gzip_comp_level 6;
    gzip_min_length 1024;
    gzip_types text/plain text/css text/xml application/json application/javascript image/svg+xml;

    # Brotli compression — requires ngx_brotli module (15-25% better than gzip on JS/CSS)
    # Install: apt-get install libnginx-mod-brotli  or  compile with --add-module=ngx_brotli
    brotli on;
    brotli_comp_level 4;
    brotli_min_length 1024;
    brotli_types text/plain text/css text/xml application/json application/javascript image/svg+xml;

    # Max upload size - course access proof can include up to five 10MB files plus form overhead.
    client_max_body_size 64M;

    # ── Laravel Reverb WebSocket proxy ────────────────────────────────────
    # Browsers connect to wss://yourdomain.com/app/REVERB_APP_KEY on port 443.
    # Nginx upgrades the connection to WebSocket and proxies to Reverb on 127.0.0.1:8080.
    # Port 8080 is NOT exposed to the internet — only reachable from localhost.
    location /app/ {
        proxy_pass http://127.0.0.1:8080;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "Upgrade";
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        # Reverb sends pings every 60s — timeout must be longer than that
        proxy_read_timeout 120s;
        proxy_send_timeout 120s;
    }

    # Broadcasting auth endpoint (standard HTTPS, not WebSocket)
    location /broadcasting/ {
        try_files $uri $uri/ /index.php?$query_string;
    }

    # Static assets — Vite generates hashed filenames so safe to cache forever
    location ~* \.(css|js|jpg|jpeg|png|gif|ico|svg|woff|woff2|ttf|eot|webp)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
        try_files $uri =404;
    }

    # Block all dot files (.env, .git, .htaccess, etc.)
    location ~ /\. {
        deny all;
    }

    # Block PHP files outside of the single public entry point
    location ~ \.php$ {
        deny all;
    }

    # Laravel entry point — tries file/directory first, then routes to index.php
    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    location = /index.php {
        include fastcgi_params;
        fastcgi_pass unix:/run/php/php8.2-fpm.sock;
        fastcgi_param SCRIPT_FILENAME $realpath_root$fastcgi_script_name;
        fastcgi_param DOCUMENT_ROOT $realpath_root;
        fastcgi_index index.php;
        fastcgi_read_timeout 60;
        internal;
    }

    access_log /var/log/nginx/paradisedollz_access.log;
    error_log  /var/log/nginx/paradisedollz_error.log;
}
